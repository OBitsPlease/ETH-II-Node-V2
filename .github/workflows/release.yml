name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build stratum.exe
        run: |
          cd stratum
          go build -o ../stratum.exe .

      - name: Build ethii node from current repo
        run: |
          go build -o ethii.exe ./cmd/geth

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build wallet installer
        run: |
          cd wallet
          npm ci
          npx electron-builder --win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wallet/dist/*.exe
            stratum.exe
            ethii.exe
            suite-version.txt
            watchdog-autopilot.ps1
            launch-stratum.ps1
            README.md
